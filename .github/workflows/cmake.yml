name: CMake Build and Test

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libfftw3-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install fftw

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: vcpkg install openblas:x64-windows fftw3:x64-windows

    - name: Configure CMake
      run: >
        cmake -B build -S .
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_TESTS=ON
        -DCMAKE_VERBOSE_MAKEFILE=ON
        ${{ runner.os == 'Windows' && '-T ClangCL -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Run tests
      run: cd build && ctest -C ${{ matrix.build_type }} --verbose
